<!-- home.html -->

<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0" />

  <title>ARM Fish & Prawns</title>

  <!-- GOOGLE FONT -->

  <link rel="preconnect"
    href="https://fonts.googleapis.com">

  <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <style>

    /* =========================
       GLOBAL STYLES
    ========================== */

    * {

      margin: 0;

      padding: 0;

      box-sizing: border-box;

      font-family: 'Poppins', sans-serif;

    }

    html {

      scroll-behavior: smooth;

    }

    body {

      min-height: 100vh;

      display: flex;

      justify-content: center;

      align-items: center;

      overflow: hidden;

      position: relative;

      padding: 20px;

      background:
        linear-gradient(
          -45deg,
          #091428,
          #0f3460,
          #1a1a2e,
          #16213e
        );

      background-size: 400% 400%;

      animation: gradientBG 15s ease infinite;

      color: white;

    }

    body::-webkit-scrollbar {

      width: 0;

      height: 0;

    }

    @keyframes gradientBG {

      0% {

        background-position: 0% 50%;

      }

      50% {

        background-position: 100% 50%;

      }

      100% {

        background-position: 0% 50%;

      }

    }

    /* =========================
       FLOATING CIRCLES
    ========================== */

    .bg-circle {

      position: absolute;

      border-radius: 50%;

      background: rgba(255,255,255,0.08);

      backdrop-filter: blur(10px);

      animation: float 12s infinite ease-in-out;

      z-index: 1;

    }

    .circle1 {

      width: 260px;

      height: 260px;

      top: -80px;

      left: -80px;

    }

    .circle2 {

      width: 320px;

      height: 320px;

      bottom: -120px;

      right: -100px;

      animation-duration: 16s;

    }

    .circle3 {

      width: 140px;

      height: 140px;

      top: 18%;

      right: 12%;

      animation-duration: 10s;

    }

    @keyframes float {

      0%,100% {

        transform: translateY(0px);

      }

      50% {

        transform: translateY(-25px);

      }

    }

    /* =========================
       MAIN CARD
    ========================== */

    .home-container {

      width: 100%;

      max-width: 480px;

      padding: 50px 35px;

      border-radius: 30px;

      background: rgba(255,255,255,0.08);

      border: 1px solid rgba(255,255,255,0.15);

      backdrop-filter: blur(18px);

      -webkit-backdrop-filter: blur(18px);

      box-shadow:
        0 8px 32px rgba(0,0,0,0.35),
        inset 0 0 0.5px rgba(255,255,255,0.25);

      text-align: center;

      z-index: 10;

      position: relative;

      transition: 0.4s ease;

    }

    .home-container:hover {

      transform: translateY(-4px);

      box-shadow:
        0 12px 45px rgba(0,0,0,0.45);

    }

    /* =========================
       LOGO
    ========================== */

    .logo {

      width: 100px;

      height: 100px;

      margin: auto;

      margin-bottom: 28px;

      border-radius: 50%;

      background:
        linear-gradient(
          135deg,
          rgba(0,255,163,0.9),
          rgba(0,194,255,0.9)
        );

      display: flex;

      justify-content: center;

      align-items: center;

      font-size: 42px;

      color: white;

      font-weight: bold;

      box-shadow:
        0 10px 30px rgba(0,255,163,0.25);

      animation: pulse 3s infinite;

    }

    @keyframes pulse {

      0% {

        transform: scale(1);

      }

      50% {

        transform: scale(1.05);

      }

      100% {

        transform: scale(1);

      }

    }

    /* =========================
       TITLE
    ========================== */

    .home-container h1 {

      color: white;

      font-size: 2rem;

      font-weight: 700;

      margin-bottom: 12px;

      letter-spacing: 0.5px;

      line-height: 1.3;

    }

    .subtitle {

      color: rgba(255,255,255,0.78);

      font-size: 0.95rem;

      margin-bottom: 38px;

      line-height: 1.7;

    }

    /* =========================
       BUTTONS
    ========================== */

    .button-group {

      display: flex;

      flex-direction: column;

      gap: 18px;

    }

    .home-btn {

      width: 100%;

      padding: 17px;

      border: none;

      border-radius: 18px;

      font-size: 1rem;

      font-weight: 600;

      cursor: pointer;

      transition: all 0.35s ease;

      position: relative;

      overflow: hidden;

      color: white;

      letter-spacing: 0.5px;

    }

    .home-btn::before {

      content: "";

      position: absolute;

      width: 0%;

      height: 100%;

      left: 0;

      top: 0;

      background: rgba(255,255,255,0.12);

      transition: 0.4s;

    }

    .home-btn:hover::before {

      width: 100%;

    }

    .home-btn:hover {

      transform:
        translateY(-3px)
        scale(1.01);

    }

    .bill-btn {

      background:
        linear-gradient(
          135deg,
          #5b86e5,
          #36d1dc
        );

      box-shadow:
        0 8px 24px rgba(54,209,220,0.35);

    }

    .return-btn {

      background:
        linear-gradient(
          135deg,
          #ff416c,
          #ff4b2b
        );

      box-shadow:
        0 8px 24px rgba(255,75,43,0.35);

    }

    /* =========================
       FOOTER
    ========================== */

    .footer {

      margin-top: 28px;

      color: rgba(255,255,255,0.65);

      font-size: 13px;

      letter-spacing: 1px;

    }

    /* =========================
       RESPONSIVE
    ========================== */

    @media(max-width:768px) {

      .home-container {

        padding: 42px 28px;

      }

      .home-container h1 {

        font-size: 1.7rem;

      }

    }

    @media(max-width:480px) {

      body {

        padding: 15px;

      }

      .home-container {

        padding: 36px 22px;

        border-radius: 24px;

      }

      .logo {

        width: 82px;

        height: 82px;

        font-size: 34px;

      }

      .home-container h1 {

        font-size: 1.45rem;

      }

      .subtitle {

        font-size: 0.88rem;

      }

      .home-btn {

        padding: 15px;

        font-size: 0.95rem;

      }

    }

  </style>

</head>

<body>

  <!-- FLOATING CIRCLES -->

  <div class="bg-circle circle1"></div>

  <div class="bg-circle circle2"></div>

  <div class="bg-circle circle3"></div>

  <!-- MAIN CARD -->

  <div class="home-container">

    <!-- LOGO -->

    <div class="logo">

      🐟

    </div>

    <!-- TITLE -->

    <h1>

      ARM Fish & Prawns

    </h1>

    <p class="subtitle">

      Premium Fish Billing &
      Return Slip Management System

    </p>

    <!-- BUTTONS -->

    <div class="button-group">

      <button class="home-btn bill-btn"
        onclick="openBillPage()">

        Bill Generation

      </button>

      <button class="home-btn return-btn"
        onclick="openReturnSlip()">

        Return Slip

      </button>

    </div>

    <!-- FOOTER -->

    <div class="footer">

      Fresh • Fast • Reliable

    </div>

  </div>

  <script>

    function openBillPage() {

      window.location.href =
        "bill.html";

    }

    function openReturnSlip() {

      window.location.href =
        "return-slip.html";

    }

  </script>

</body>

</html>
