<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>ARM Fish & Prawns Return Management</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

/* =========================
   GLOBAL
========================= */

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #f4f6f9;
  padding: 20px;
}

.wrapper {
  width: 100%;
  max-width: 1500px;
  margin: auto;
}

/* CARD */
.glass-card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
  border: 1px solid #ddd;
}

/* HEADER CENTER FIX */
.header {
  position: relative;
  text-align: center;
  margin-bottom: 20px;
}

/* TITLE CENTER */
.title-section {
  text-align: center;
}

.title-section h1 {
  font-size: 22px;
  font-weight: 700;
}

.title-section p {
  font-size: 13px;
  color: #666;
}

/* DATE TOP RIGHT */
.date-box {
  position: absolute;
  right: 0;
  top: 0;
  padding: 8px 12px;
  background: #f1f1f1;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-size: 13px;
}

/* FORM */
.form-layout {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.column {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.bottom-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

/* INPUT */
.input-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.input-group label {
  font-weight: 600;
  font-size: 13px;
}

.input-group input {
  padding: 14px 12px;   /* increased height */
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 14px;
  outline: none;
}

/* SUMMARY */
.summary {
  margin-top: 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.summary-card {
  background: #fafafa;
  border: 1px solid #ddd;
  padding: 15px;
  border-radius: 8px;
}

.summary-title {
  font-size: 13px;
  color: #666;
}

.summary-amount {
  font-size: 20px;
  font-weight: 700;
}

/* BUTTONS */
.button-group {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 20px;
  flex-wrap: wrap;
}

.btn {
  padding: 10px 18px;
  border: none;
  border-radius: 6px;
  color: white;
  font-weight: 600;
  cursor: pointer;
}

.print-btn { background: #007bff; }
.pdf-btn { background: #dc3545; }
.share-btn { background: #28a745; }

/* FOOTER */
footer {
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  color: #777;
}

/* RESPONSIVE */
@media(max-width:768px){

  .glass-card {
    width: 100%;
  }

  .form-row,
  .bottom-grid,
  .summary {
    grid-template-columns: 1fr;
  }

  .date-box {
    position: static;
    margin-top: 10px;
    display: inline-block;
  }
}

@media(max-width:768px){

  .input-group input {
    padding: 10px 10px;   /* reduced height */
    font-size: 13px;      /* slightly smaller text */
  }

  .input-group {
    gap: 4px;             /* tighter spacing */
  }
}

</style>
</head>

<body>

<div class="wrapper">

  <div class="glass-card" id="pdfContent">

    <!-- HEADER -->
    <div class="header">

      <div class="title-section">
        <h1>RETURN SLIP</h1>
        <p>Premium Return Slip Generator</p>
      </div>

      <div class="date-box" id="currentDate"></div>

    </div>

    <!-- FORM -->
    <div class="form-layout">

      <div class="input-group">
        <label>Vehicle Number</label>
        <input id="vehicleNumber" placeholder="Enter vehicle number">
      </div>

      <div class="form-row">

        <div class="column">
          <div class="input-group">
            <label>Coverlu</label>
            <input placeholder="Enter Coverlu">
          </div>

          <div class="input-group">
            <label>Bonthalu</label>
            <input placeholder="Enter Bonthalu">
          </div>

          <div class="input-group">
            <label>Barakalu</label>
            <input placeholder="Enter Barakalu">
          </div>
        </div>

        <div class="column">
          <div class="input-group">
            <label>Trelu Amount</label>
            <input id="treluAmount" placeholder="Enter trelu amount">
          </div>

          <div class="input-group">
            <label>Return Amount</label>
            <input id="returnAmount" placeholder="Enter return amount">
          </div>

          <div class="input-group">
            <label>Loading Amount</label>
            <input id="loadingAmount" placeholder="Enter loading amount">
          </div>
        </div>

      </div>

      <div class="bottom-grid">

        <div class="input-group">
          <label>Extra Expenses</label>
          <input id="extraExpenses" placeholder="0">
        </div>

        <div class="input-group">
          <label>Advance Amount</label>
          <input id="advanceAmount" placeholder="Enter advance amount">
        </div>

      </div>

    </div>

    <!-- SUMMARY -->
    <div class="summary">

      <div class="summary-card">
        <div class="summary-title">Total Expenditure</div>
        <div class="summary-amount" id="totalExpenditure">₹0</div>
      </div>

      <div class="summary-card">
        <div class="summary-title">Balance Amount</div>
        <div class="summary-amount" id="balanceAmount">₹0</div>
      </div>

    </div>

    <!-- BUTTONS -->
    <div class="button-group">

      <button class="btn print-btn" onclick="window.print()">Print</button>
      <button class="btn pdf-btn" onclick="downloadPDF()">PDF</button>
      <button class="btn share-btn" onclick="shareSnapshot()">Share</button>

    </div>

  </div>

</div>

<footer>© 2026 ARM Fish & Prawns Return Management</footer>

<script>

/* DATE */
document.getElementById("currentDate").innerText =
new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"long",year:"numeric"});

/* INPUT FORMAT */
const ids=["returnAmount","loadingAmount","treluAmount","extraExpenses","advanceAmount"];

ids.forEach(id=>{
document.getElementById(id).addEventListener("input",function(){
let v=this.value.replace(/,/g,'').replace(/\D/g,'');
this.value=v?Number(v).toLocaleString("en-IN"):"";
calc();
});
});

function get(id){
return parseInt(document.getElementById(id).value.replace(/,/g,''))||0;
}

/* CALC */
function calc(){
const total =
get("returnAmount")+
get("loadingAmount")+
get("treluAmount");

let balance =
get("advanceAmount") - total - get("extraExpenses");

document.getElementById("totalExpenditure").innerText="₹"+total.toLocaleString("en-IN");
document.getElementById("balanceAmount").innerText="₹"+balance.toLocaleString("en-IN");
}

/* PDF */
function downloadPDF(){
html2pdf().from(document.getElementById("pdfContent")).set({
margin:0.2,
filename:"ARM_Bill.pdf",
html2canvas:{scale:2,backgroundColor:"#fff"},
jsPDF:{format:"a4"}
}).save();
}

/* SNAPSHOT FIX */
async function shareSnapshot() {

  const el = document.getElementById("pdfContent");

  // wait for fonts + layout stabilization
  await document.fonts.ready;
  await new Promise(r => setTimeout(r, 300));

  const canvas = await html2canvas(el, {
    scale: 3,              // ↑ sharper + prevents missing digits
    useCORS: true,
    backgroundColor: "#ffffff",
    scrollX: 0,
    scrollY: 0,
    windowWidth: document.documentElement.scrollWidth,
    windowHeight: document.documentElement.scrollHeight
  });

  canvas.toBlob(async (blob) => {

    const file = new File([blob], "ARM_Bill.png", {
      type: "image/png"
    });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {

      try {
        await navigator.share({
          title: "ARM Bill",
          text: "Return Slip",
          files: [file]
        });
      } catch (e) {
        console.log(e);
      }

    } else {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "ARM_Bill.png";
      a.click();
    }

  });

}
</script>

</body>
</html>
